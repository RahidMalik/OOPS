<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: monospace;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
        }

        #arena {
            border: 2px solid #555;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        button {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
        }

        button:hover {
            background: #b71c1c;
        }

        .log-entry {
            margin: 5px 0;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }
    </style>
</head>

<body>
    <h1>The OOP Arena</h1>
    <div id="arena">
        <div id="stats"></div>
        <br>
        <button id="attackBtn">Commence Attack!</button>
    </div>
    <div id="battle-log"></div>
    <script src="app.js"></script>
</body>

</html>
